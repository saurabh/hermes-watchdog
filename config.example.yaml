# hermes-watchdog configuration
# Copy to config.yaml and adjust for your setup.

hermes:
  # Path to hermes home directory
  home: ~/.hermes
  # Systemd service name (user or system)
  service: hermes-gateway
  # Whether to use --user flag with systemctl
  systemd_user: true
  # Log files to monitor
  logs:
    gateway: ~/.hermes/logs/gateway.log
    errors: ~/.hermes/logs/errors.log

probe:
  # Max age (seconds) of last Telegram poll before considering stale
  polling_stale_seconds: 600
  # Max age (seconds) of gateway log before considering stale
  log_stale_seconds: 300
  # Regex pattern to detect active polling in gateway log.
  # Set this to match your platform's polling signature.
  # Examples:
  #   Telegram:  getUpdates           (default)
  #   Discord:   HEARTBEAT|heartbeat_ack
  #   Slack:     apps\.connections\.open|socket_mode
  #   WhatsApp:  recv|message_received
  #   Matrix:    /sync
  #   IRC:       PING|PONG
  #   Generic:   poll|heartbeat|keepalive
  heartbeat_pattern: "getUpdates"
  # Max seconds to stay in 'degraded' before escalating to 'critical'.
  # Catches polling zombies (process alive, logs fresh, but polling dead).
  # Set to 0 to disable (degraded stays forever — NOT recommended).
  # Default: 1800 (30 minutes)
  max_degraded_seconds: 1800

remediation:
  # Cooldown between same-level remediation actions (seconds)
  cooldown_seconds: 300
  # Max auto-remediation attempts before escalating
  max_attempts: 3
  # Escalation chain (in order)
  chain:
    - systemctl_restart    # Restart via systemd
    - process_kill_restart # Kill process, let systemd restart
    - escalate             # Notify operator

upstream:
  # GitHub repo to search/file issues against
  repo: NousResearch/hermes-agent
  # Create issues after N occurrences of same error (0 = disabled)
  auto_issue_after: 3
  # Create PRs for known fix patterns (requires fork)
  auto_pr: false
  # Fork repo (for PR creation)
  fork: ""

incidents:
  # Where to store incident data
  data_dir: ~/.hermes/watchdog
  # Max age of resolved incidents before pruning (days)
  retention_days: 90

notify:
  # v0.2: Argus reads Hermes's own platform credentials for notifications.
  # No separate tokens needed — Argus reads ~/.hermes/config.yaml and .env.
  hermes_home: ~/.hermes
  # Optional: override the auto-detected notification target
  # override_platform: telegram
  # override_chat_id: "123456789"
  #
  # Legacy v0.1 config (still works, deprecated):
  # method: telegram
  # telegram_bot_token: ""
  # telegram_chat_id: ""
  # discord_webhook: ""
